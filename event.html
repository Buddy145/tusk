<!DOCTYPE html>
<html>
<head>
    <title>Event Bubbling vs Capturing</title>
</head>
<body>
    <div id="parent" style="padding: 30px; background-color: lightblue;">
        Parent
        <div id="child" style="padding: 20px; background-color: lightgreen;">
            Child
            <button id="btn" style="padding: 10px;">Click Me</button>
        </div>
    </div>

    <script>
        // Parent Element
        document.getElementById('parent').addEventListener('click', function() {
            console.log('Parent Clicked!');
        }, true); // `false` = Bubbling Phase

        // Child Element
        document.getElementById('child').addEventListener('click', function() {
            console.log('Child Clicked!');
        }, true); // `true` = Capturing Phase

        // Button Element
        document.getElementById('btn').addEventListener('click', function(event) {
            console.log('Button Clicked!');
        },true);
    </script>
</body>
</html>
